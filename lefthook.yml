# lefthook.yml — Cypress / TypeScript repo
# SYNC-MANAGED (base guards). Stack-specific hooks below are repo-owned.
# See shared-docs/docs/adr/ADR-013-multirepo-sync-strategy.md

min_version: 1.6.0

pre-commit:
  parallel: true
  commands:

    # ── Universal guards (sync-managed) ─────────────────────────────────────

    no-search-engine:
      glob: "**/*.ts"
      run: |
        if grep -rn "bing\|google\.com\|search-engine\|SearchEngine" {staged_files} 2>/dev/null | grep -v "//"; then
          echo "❌ Search-engine reference found. See ADR decommission plan."
          exit 1
        fi

    no-assertions-in-poms:
      glob: "cypress/{pages,locators,components}/**/*.ts"
      run: |
        if grep -n "\.should(\|expect(\|cy\.contains(" {staged_files} 2>/dev/null; then
          echo "❌ Assertion found in pages/locators/components. Violates Law 2."
          exit 1
        fi

    no-selectors-in-tests:
      glob: "cypress/e2e/**/*.ts"
      run: |
        if grep -n "cy\.get(\|cy\.find(" {staged_files} 2>/dev/null; then
          echo "❌ Raw cy.get() found in specs. Violates Law 3. Use page/component methods."
          exit 1
        fi

    no-numeric-wait:
      glob: "**/*.ts"
      run: |
        if grep -n "cy\.wait([0-9]" {staged_files} 2>/dev/null; then
          echo "❌ cy.wait(<number>) found. Use cy.intercept aliases or retry-able queries."
          exit 1
        fi

    # ── Stack-specific linting ───────────────────────────────────────────────

    eslint:
      glob: "**/*.ts"
      run: pnpm exec eslint {staged_files} --max-warnings 0

    tsc:
      glob: "**/*.ts"
      run: pnpm exec tsc --noEmit

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
