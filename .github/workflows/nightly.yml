name: Nightly Test Suite

# Optional Google Lighthouse CLI (not part of this matrix): see
# .github/workflows/cypress-lighthouse-optional.yml and docs/OPTIONAL_LIGHTHOUSE.md

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HEADLESS: true
      CI: 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Cypress binary
        run: pnpm exec cypress install

      - name: Run unit tests
        run: pnpm run test:unit

  e2e-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [unit-tests]
    strategy:
      fail-fast: false
      matrix:
        suite:
          [sauce, practice, backend, visual, accessibility, performance, bdd]
    env:
      HEADLESS: true
      CI: 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Cypress binary
        run: pnpm exec cypress install

      - name: Checkout practice app
        if: matrix.suite == 'practice'
        uses: actions/checkout@v5
        with:
          repository: dsolisp/qa-practice-app
          path: qa-practice-app

      - name: Start practice app
        if: matrix.suite == 'practice'
        run: |
          docker compose -f qa-practice-app/docker-compose.yml up -d
          echo "Waiting for practice app on localhost:8080..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "Practice app ready after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Practice app did not start within 60s" >&2
          exit 1

      - name: Run Cypress suite (${{ matrix.suite }})
        continue-on-error: true
        run: |
          case "${{ matrix.suite }}" in
            sauce)         SPEC="cypress/ui/sauce/**/*.cy.ts" ;;
            practice)      SPEC="cypress/ui/practice/**/*.cy.ts" ;;
            backend)       SPEC="cypress/backend/**/*.cy.ts" ;;
            visual)        SPEC="cypress/ui/visual/**/*.cy.ts" ;;
            accessibility) SPEC="cypress/accessibility/**/*.cy.ts" ;;
            performance)   SPEC="cypress/performance/**/*.cy.ts" ;;
            bdd)           SPEC="cypress/integration/**/*.feature" ;;
            *) echo "Unknown suite: ${{ matrix.suite }}"; exit 2 ;;
          esac
          pnpm exec cypress run --spec "$SPEC"

      - name: Upload Allure results (JSON)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-${{ github.run_id }}-${{ matrix.suite }}
          path: allure-results/

      - name: Generate metrics summary.json
        if: always()
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          TEST_SUITE: nightly-${{ matrix.suite }}
          ALLURE_RESULTS_DIR: allure-results
        run: node scripts/generate_summary_json.js

      - name: Upload summary.json to Cloudflare R2 (metrics)
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp summary.json s3://qa-portfolio-metrics/${{ github.event.repository.name }}/${{ github.run_id }}-${{ matrix.suite }}.json --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure HTML report (artifact)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report-${{ github.run_id }}-${{ matrix.suite }}
          path: allure-report/
          if-no-files-found: warn

      - name: Upload Report to Cloudflare R2
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 sync allure-report/ s3://qa-portfolio-allure/${{ github.event.repository.name }}/${{ github.run_id }}/${{ matrix.suite }}/ --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - name: Add Report URL to Summary
        if: always()
        env:
          VAR_R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}
          SECRET_R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          {
            echo "### Allure report — ${{ matrix.suite }}"
            echo ""
            echo "GitHub **does not** expose artifact files at a browsable \`github.com/.../index.html\` URL (those links always 404)."
            echo "Use the **allure-report-${{ github.run_id }}-${{ matrix.suite }}** artifact: download, unzip, open \`index.html\` locally."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Use repo variable `vars.R2_PUBLIC_URL` (not secret) for public domains.
          R2_PUBLIC_URL="${VAR_R2_PUBLIC_URL:-}"
          if [ -z "${R2_PUBLIC_URL:-}" ]; then
            R2_PUBLIC_URL="${SECRET_R2_PUBLIC_URL:-}"
          fi

          R2_PUBLIC_URL="$(echo "${R2_PUBLIC_URL:-}" | xargs)"
          R2_PUBLIC_URL="${R2_PUBLIC_URL%/}"
          if [ -n "$R2_PUBLIC_URL" ] && [[ ! "$R2_PUBLIC_URL" =~ ^https?:// ]]; then
            R2_PUBLIC_URL="https://${R2_PUBLIC_URL}"
          fi

          if [ -n "$R2_PUBLIC_URL" ] && [[ "$R2_PUBLIC_URL" != *"github.com"* ]] && [[ "$R2_PUBLIC_URL" != "***" ]]; then
            FINAL_URL="${R2_PUBLIC_URL}/${{ github.event.repository.name }}/${{ github.run_id }}/${{ matrix.suite }}/index.html"
            echo "Hosted copy (R2): [index.html](${FINAL_URL})" >> "$GITHUB_STEP_SUMMARY"
          elif [ -n "$R2_PUBLIC_URL" ]; then
            echo "⚠️ Set **R2_PUBLIC_URL** as a **Repository Variable** (not secret) to avoid masking.\n- Go to **Settings → Secrets and variables → Actions → Variables**\n- Add **R2_PUBLIC_URL** = your public base (e.g. \`https://pub-....r2.dev\`)\n\nDo not use a \`github.com\` URL." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Optional: set **R2_PUBLIC_URL** to that public base URL to get a hosted link above." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Enforce 95% pass rate threshold
        if: always()
        run: |
          PASS_RATE=$(node -e "
            const fs = require('fs');
            try {
              const s = JSON.parse(fs.readFileSync('summary.json', 'utf8'));
              const total = Number(s.total) || 0;
              const passed = Number(s.passed) || 0;
              const rate = total > 0 ? Math.round((passed / total) * 100) : 0;
              process.stdout.write(String(rate));
            } catch (e) {
              process.stdout.write('0');
            }
          ")
          echo "Pass rate: ${PASS_RATE}%"
          if [ "${PASS_RATE}" -lt 95 ]; then
            echo "❌ Pass rate ${PASS_RATE}% is below the 95% threshold — build FAILED."
            exit 1
          else
            echo "✅ Pass rate ${PASS_RATE}% meets the 95% threshold — build PASSED."
          fi
