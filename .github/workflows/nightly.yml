name: Nightly Test Suite

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      HEADLESS: true
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Run unit tests
        run: pnpm run test:unit

  e2e-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [unit-tests]
    strategy:
      fail-fast: false
      matrix:
        suite: [sauce, practice, backend, visual, accessibility, performance, bdd]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      HEADLESS: true
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Cypress suite (${{ matrix.suite }})
        continue-on-error: true
        run: |
          case "${{ matrix.suite }}" in
            sauce)         SPEC="cypress/ui/sauce/**/*.cy.ts" ;;
            practice)      SPEC="cypress/ui/practice/**/*.cy.ts" ;;
            backend)       SPEC="cypress/backend/**/*.cy.ts" ;;
            visual)        SPEC="cypress/ui/visual/**/*.cy.ts" ;;
            accessibility) SPEC="cypress/accessibility/**/*.cy.ts" ;;
            performance)   SPEC="cypress/performance/**/*.cy.ts" ;;
            bdd)           SPEC="cypress/integration/**/*.feature" ;;
            *) echo "Unknown suite: ${{ matrix.suite }}"; exit 2 ;;
          esac
          pnpm exec cypress run --spec "$SPEC"

      - name: Upload Allure results (JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}-${{ matrix.suite }}
          path: allure-results/

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload Report to Cloudflare R2
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 sync allure-report/ s3://qa-portfolio-allure/${{ github.event.repository.name }}/${{ github.run_id }}/${{ matrix.suite }}/ --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - name: Add Report URL to Summary
        if: always()
        run: |
          echo "### 📊 Allure Report — ${{ matrix.suite }}" >> $GITHUB_STEP_SUMMARY
          echo "[View Full Report](${{ secrets.R2_PUBLIC_URL }}/${{ github.event.repository.name }}/${{ github.run_id }}/${{ matrix.suite }}/index.html)" >> $GITHUB_STEP_SUMMARY
