name: Full Test Suite

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ui-sauce
          - ui-practice
          - backend
          - visual
          - a11y
          - performance
          - bdd

concurrency:
  group: full-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      HEADLESS: true
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Run unit tests
        run: pnpm run test:unit
        
      - name: Run Sauce UI tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'ui-sauce' }}
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: pnpm exec cypress run --spec 'cypress/ui/sauce/**/*.cy.ts'

      - name: Run Practice UI tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'ui-practice' }}
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: pnpm exec cypress run --spec 'cypress/ui/practice/**/*.cy.ts'

      - name: Run Backend tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'backend' }}
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: pnpm exec cypress run --spec 'cypress/backend/**/*.cy.ts'

      - name: Run Visual tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'visual' }}
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: pnpm exec cypress run --spec 'cypress/ui/visual/**/*.cy.ts'

      - name: Run Accessibility tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'a11y' }}
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: pnpm exec cypress run --spec 'cypress/accessibility/**/*.cy.ts'

      - name: Run Performance tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'performance' }}
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: pnpm exec cypress run --spec 'cypress/performance/**/*.cy.ts'

      - name: Run BDD tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'bdd' }}
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: pnpm exec cypress run --spec 'cypress/integration/**/*.feature'

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results/
